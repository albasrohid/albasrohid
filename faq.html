<div class="faq-item">
<div class="faq-question">Apa tujuan yayasan?</div>
<div class="faq-answer">Untuk kegiatan sosial, pendidikan dan dakwah.</div>
</div>

<div class="faq-item">
<div class="faq-question">Bagaimana cara mendaftar?</div>
<div class="faq-answer">Silakan isi formulir pada menu daftar.</div>
</div>

<div class="faq-item">
<div class="faq-question">Dimana melihat dokumentasi?</div>
<div class="faq-answer">Buka menu dokumentasi.</div>
</div>

</div>

<script>
let q=document.querySelectorAll(".faq-question");
q.forEach(el=>{
el.onclick=()=>{
let a=el.nextElementSibling;
a.style.display=a.style.display==="block"?"none":"block";
}
});
</script>
